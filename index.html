<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rimuzz - Home</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
}

body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    background-color: #000;
    color: white;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

#parallax-container {
    position: fixed;
    top: -10%;
    left: -10%;
    width: 120%;
    height: 120%;
    z-index: -3;
    transition: transform 0.2s cubic-bezier(0.1, 0.5, 0.2, 1);
}

#bg-image {
    width: 100%;
    height: 100%;
    background-image: url('https://lh3.googleusercontent.com/u/0/d/10_EZUNRtKgGIhxoBPZdx8uEd0bfOZG4o');
    background-size: cover;
    background-position: center;
    filter: blur(4px) brightness(0.5);
    transform: scale(1.1);
    animation: slowBreath 15s infinite alternate ease-in-out;
}

@keyframes slowBreath {
    from { transform: scale(1.1); }
    to { transform: scale(1.15); }
}

.overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.03) 0%, transparent 60%);
    background-size: 100% 3px, 100% 100%;
    z-index: -1;
    pointer-events: none;
}

.content-card {
    position: relative;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 40px;
    padding: 60px 40px;
    width: 90%;
    max-width: 500px;
    text-align: center;
    z-index: 10;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInUp 1.2s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
}

@keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: 3.5em;
    letter-spacing: 12px;
    margin-bottom: 10px;
    text-transform: uppercase;
    font-weight: 900;
    background: linear-gradient(to bottom, #fff, #aaa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub-title {
    font-size: 0.9em;
    letter-spacing: 5px;
    opacity: 0.5;
    margin-bottom: 30px;
    text-transform: uppercase;
}

.intro-text {
    font-size: 1.05em;
    line-height: 1.8;
    margin-bottom: 45px;
    opacity: 0.8;
    font-weight: 300;
}

.nav-container {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.btn-nav {
    text-decoration: none;
    color: white;
    background: rgba(255, 255, 255, 0.05);
    padding: 15px 25px;
    border-radius: 100px;
    border: 1px solid var(--glass-border);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 2px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    display: inline-flex;
    align-items: center;
    gap: 10px;
}

.btn-nav:hover {
    background: white;
    color: black;
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(255,255,255,0.15);
}

.btn-nav.btn-arcade {
    border-color: rgba(255, 165, 0, 0.3);
}

.btn-nav.btn-arcade:hover {
    background: #ffa500;
    color: black;
    box-shadow: 0 10px 20px rgba(255, 165, 0, 0.2);
}

.particle {
    position: absolute;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: -2;
    opacity: 0.3;
}

@keyframes floatAround {
    0% { transform: translate(0, 0); }
    50% { transform: translate(20px, -30px); }
    100% { transform: translate(-10px, 10px); }
}

.footer-info {
    position: fixed;
    bottom: 30px;
    font-size: 10px;
    letter-spacing: 3px;
    opacity: 0.4;
    text-transform: uppercase;
}
</style>
</head>

<body>

<div id="parallax-container">
    <div id="bg-image"></div>
</div>

<div class="overlay"></div>
<div id="particles-js"></div>

<div class="content-card">
    <div class="sub-title">PERSONAL PORTAL</div>
    <h1>RIMUZZ.</h1>
    
    <p class="intro-text">
        Selamat datang di titik awal. <br>
        Ruang tenang untuk menuangkan ide, <br> 
        cerita, dan eksplorasi digital.
    </p>

    <div class="nav-container">
        <a href="hal2.html" class="btn-nav">
            <i class="fas fa-briefcase"></i> WORKSPACE
        </a>
        <a href="hal3.html" class="btn-nav">
            <i class="fas fa-feather-alt"></i> STORIES
        </a>
        <!-- LINK DIPERBAIKI KE scrap_tycoon.html -->
        <a href="Scrap_Tycoon.html" class="btn-nav">
            <i class="fas fa-gamepad"></i> ARCADE
        </a>
    </div>
</div>

<div class="footer-info">EST. 2026 • VERSION 1.0</div>

<script>
    const container = document.getElementById('parallax-container');
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 50;
        const y = (window.innerHeight / 2 - e.pageY) / 50;
        container.style.transform = `translate(${x}px, ${y}px)`;
        document.body.style.setProperty('--x', e.clientX + 'px');
        document.body.style.setProperty('--y', e.clientY + 'px');
    });

    const pContainer = document.getElementById('particles-js');
    for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 1;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.top = Math.random() * 100 + '%';
        p.style.left = Math.random() * 100 + '%';
        p.style.animation = `floatAround ${10 + Math.random() * 10}s infinite alternate ease-in-out`;
        p.style.animationDelay = Math.random() * 5 + 's';
        pContainer.appendChild(p);
    }
</script>

</body>
</html>
