<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rimuzz - Workspace</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
    --accent: #fff;
}

body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    background-color: #000;
    color: white;
    overflow-x: hidden;
}

#parallax-container {
    position: fixed;
    top: -10%;
    left: -10%;
    width: 120%;
    height: 120%;
    z-index: -3;
    transition: transform 0.2s cubic-bezier(0.1, 0.5, 0.2, 1);
}

#bg-image {
    width: 100%;
    height: 100%;
    background-image: url('https://lh3.googleusercontent.com/u/0/d/1hFOxPryUrixo6EtW_-XQIwOz8BIIgId-');
    background-size: cover;
    background-position: center;
    filter: blur(5px) brightness(0.4);
    transform: scale(1.1);
    animation: slowZoom 20s infinite alternate;
}

@keyframes slowZoom { from { transform: scale(1.1); } to { transform: scale(1.2); } }

.overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.4) 50%);
    background-size: 100% 4px;
    z-index: -1;
    pointer-events: none;
}

.main-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 100px 20px;
    min-height: 100vh;
    box-sizing: border-box;
}

.content-card {
    background: var(--glass);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border);
    border-radius: 30px;
    padding: 40px;
    width: 90%;
    max-width: 800px;
    text-align: center;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}

h1 {
    font-size: 2.5em;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 10px;
}

.intro-text { opacity: 0.7; margin-bottom: 30px; font-weight: 300; }

.nav-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }

.btn {
    padding: 12px 25px;
    border-radius: 50px;
    border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.05);
    color: white;
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 1px;
    text-decoration: none;
    transition: 0.3s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn:hover { background: white; color: black; transform: translateY(-3px); }

.btn-danger { color: #ff5f5f; border-color: rgba(255, 95, 95, 0.3); }
.btn-danger:hover { background: #ff5f5f; color: white; }

.library-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
    margin-top: 30px;
    text-align: left;
}

.book-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--glass-border);
    padding: 20px;
    border-radius: 20px;
    transition: 0.3s;
    cursor: pointer;
    position: relative;
}

.book-item:hover { background: rgba(255,255,255,0.08); border-color: white; }
.book-item h3 { margin: 0 0 10px 0; font-size: 1.1em; }
.book-item p { font-size: 0.8em; opacity: 0.6; height: 3em; overflow: hidden; }

.modal {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(15px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-content {
    background: #0a0a0a;
    border: 1px solid var(--glass-border);
    padding: 40px;
    border-radius: 30px;
    width: 90%;
    max-width: 600px;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
}

input, textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    padding: 15px;
    border-radius: 10px;
    color: white;
    margin-bottom: 20px;
    box-sizing: border-box;
    font-size: 16px;
}

.chapter-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.03);
    padding: 12px 20px;
    border-radius: 15px;
    margin-bottom: 10px;
    border: 1px solid transparent;
    transition: 0.2s;
}
.chapter-item:hover { border-color: rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); }

#read-content {
    line-height: 1.8;
    font-size: 1.1em;
    text-align: justify;
    color: rgba(255,255,255,0.9);
    white-space: pre-wrap;
}

.star { position: absolute; background: white; border-radius: 50%; z-index: -2; opacity: 0.5; }

/* FIX TOMBOL KEMBALI DIARAHKAN KE index.html UNTUK MENGHINDARI 404 */
.btn-back { position: fixed; top: 30px; left: 30px; z-index: 100; font-size: 11px; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

</style>
</head>
<body>

<div id="parallax-container"><div id="bg-image"></div></div>
<div class="overlay"></div>
<div id="particles-container"></div>

<!-- ARAH KE index.html AGAR TIDAK ERROR 404 -->
<a href="index.html" class="btn btn-back">← KEMBALI</a>

<div class="main-wrapper">
    <div class="content-card" id="view-library">
        <h1>WORKSPACE</h1>
        <p class="intro-text">Kelola karya dan bab cerita Anda di sini.</p>
        
        <div class="nav-group">
            <button class="btn" onclick="openModal('modal-book')"><i class="fas fa-plus"></i> BUAT BUKU</button>
            <button class="btn" onclick="toggleLibrary()"><i class="fas fa-book"></i> PERPUS</button>
            <a href="hal3.html" class="btn">STORIES</a>
        </div>

        <div id="library-container" style="display: none;">
            <h2 style="letter-spacing: 3px; font-weight: 300; margin-bottom: 20px;">LIBRARY</h2>
            <div class="library-grid" id="book-list"></div>
        </div>
    </div>
</div>

<div class="modal" id="modal-book">
    <div class="modal-content">
        <h2 id="book-modal-title">BUAT BUKU BARU</h2>
        <input type="text" id="book-title" placeholder="Judul Buku...">
        <textarea id="book-desc" rows="4" placeholder="Deskripsi Singkat..."></textarea>
        <div class="nav-group">
            <button class="btn" onclick="saveBook()">SIMPAN BUKU</button>
            <button class="btn btn-danger" onclick="closeModal('modal-book')">BATAL</button>
        </div>
    </div>
</div>

<div class="modal" id="modal-options">
    <div class="modal-content">
        <h2 id="opt-book-title">Judul Buku</h2>
        <p id="opt-book-desc" style="opacity: 0.6; margin-bottom: 30px;"></p>
        <div class="nav-group">
            <button class="btn" onclick="viewBook()"><i class="fas fa-list"></i> DAFTAR BAB</button>
            <button class="btn" onclick="editBookInfo()"><i class="fas fa-edit"></i> EDIT INFO</button>
            <button class="btn btn-danger" onclick="deleteBook()"><i class="fas fa-trash"></i> HAPUS</button>
            <button class="btn" onclick="closeModal('modal-options')">TUTUP</button>
        </div>
    </div>
</div>

<div class="modal" id="modal-chapters">
    <div class="modal-content">
        <h2 id="chap-book-title">MANAGE BAB</h2>
        <button class="btn" style="margin-bottom: 20px; width: 100%; justify-content: center;" onclick="openChapterEditor()">+ TAMBAH BAB</button>
        <div id="chapter-list"></div>
        <button class="btn" style="margin-top: 20px; width: 100%; justify-content: center;" onclick="closeModal('modal-chapters')">SELESAI</button>
    </div>
</div>

<div class="modal" id="modal-edit-chapter">
    <div class="modal-content">
        <h2>EDIT BAB</h2>
        <input type="text" id="chap-title" placeholder="Judul Bab...">
        <textarea id="chap-content" rows="12" placeholder="Tulis cerita Anda di sini..."></textarea>
        <div class="nav-group">
            <button class="btn" onclick="saveChapter()">SIMPAN BAB</button>
            <button class="btn btn-danger" onclick="closeModal('modal-edit-chapter')">BATAL</button>
        </div>
    </div>
</div>

<div class="modal" id="modal-read">
    <div class="modal-content" style="max-width: 700px;">
        <h2 id="read-title" style="text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 25px;">Judul Bab</h2>
        <div id="read-content"></div>
        <div class="nav-group" style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            <button class="btn" onclick="closeModal('modal-read')">SELESAI MEMBACA</button>
        </div>
    </div>
</div>

<script>
    let books = JSON.parse(localStorage.getItem('rimuzz_books')) || [];
    let currentBookIndex = null;
    let currentChapterIndex = null;

    function toggleLibrary() {
        const lib = document.getElementById('library-container');
        lib.style.display = lib.style.display === 'none' ? 'block' : 'none';
        if(lib.style.display === 'block') {
            setTimeout(() => { lib.scrollIntoView({ behavior: 'smooth' }); }, 100);
        }
        renderBooks();
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function saveBook() {
        const title = document.getElementById('book-title').value;
        const desc = document.getElementById('book-desc').value;
        if(!title) return;
        if(currentBookIndex !== null && document.getElementById('book-modal-title').innerText.includes("EDIT")) {
            books[currentBookIndex].title = title;
            books[currentBookIndex].desc = desc;
        } else {
            books.push({ title, desc, chapters: [] });
        }
        updateStorage();
        closeModal('modal-book');
        renderBooks();
        clearBookInputs();
    }

    function renderBooks() {
        const list = document.getElementById('book-list');
        list.innerHTML = '';
        if(books.length === 0) {
            list.innerHTML = '<p style="grid-column: 1/-1; opacity: 0.5; text-align: center;">Belum ada buku.</p>';
            return;
        }
        books.forEach((book, index) => {
            const el = document.createElement('div');
            el.className = 'book-item';
            el.innerHTML = `<h3>${book.title}</h3><p>${book.desc || '...'}</p>`;
            el.onclick = () => showOptions(index);
            list.appendChild(el);
        });
    }

    function showOptions(index) {
        currentBookIndex = index;
        document.getElementById('opt-book-title').innerText = books[index].title;
        document.getElementById('opt-book-desc').innerText = books[index].desc || "...";
        openModal('modal-options');
    }

    function editBookInfo() {
        document.getElementById('book-modal-title').innerText = "EDIT INFO BUKU";
        document.getElementById('book-title').value = books[currentBookIndex].title;
        document.getElementById('book-desc').value = books[currentBookIndex].desc;
        closeModal('modal-options');
        openModal('modal-book');
    }

    function deleteBook() {
        if(confirm("Hapus buku?")) {
            books.splice(currentBookIndex, 1);
            updateStorage();
            closeModal('modal-options');
            renderBooks();
        }
    }

    function viewBook() {
        closeModal('modal-options');
        document.getElementById('chap-book-title').innerText = books[currentBookIndex].title;
        renderChapters();
        openModal('modal-chapters');
    }

    function renderChapters() {
        const list = document.getElementById('chapter-list');
        list.innerHTML = '';
        books[currentBookIndex].chapters.forEach((chap, index) => {
            const el = document.createElement('div');
            el.className = 'chapter-item';
            el.innerHTML = `
                <span>${chap.title}</span>
                <div style="display:flex; gap:5px;">
                    <button class="btn" style="padding:8px" onclick="openReader(${index})"><i class="fas fa-eye"></i></button>
                    <button class="btn" style="padding:8px" onclick="openChapterEditor(${index})"><i class="fas fa-pen"></i></button>
                    <button class="btn btn-danger" style="padding:8px" onclick="deleteChapter(${index})"><i class="fas fa-times"></i></button>
                </div>`;
            list.appendChild(el);
        });
    }

    function openReader(index) {
        const chapter = books[currentBookIndex].chapters[index];
        document.getElementById('read-title').innerText = chapter.title;
        document.getElementById('read-content').innerText = chapter.content || "...";
        openModal('modal-read');
    }

    function openChapterEditor(index = null) {
        currentChapterIndex = index;
        if(index !== null) {
            document.getElementById('chap-title').value = books[currentBookIndex].chapters[index].title;
            document.getElementById('chap-content').value = books[currentBookIndex].chapters[index].content;
        } else {
            document.getElementById('chap-title').value = '';
            document.getElementById('chap-content').value = '';
        }
        openModal('modal-edit-chapter');
    }

    function saveChapter() {
        const title = document.getElementById('chap-title').value;
        const content = document.getElementById('chap-content').value;
        if(!title) return;
        if(currentChapterIndex !== null) {
            books[currentBookIndex].chapters[currentChapterIndex] = { title, content };
        } else {
            books[currentBookIndex].chapters.push({ title, content });
        }
        updateStorage();
        closeModal('modal-edit-chapter');
        renderChapters();
    }

    function deleteChapter(index) {
        if(confirm("Hapus bab?")) {
            books[currentBookIndex].chapters.splice(index, 1);
            updateStorage();
            renderChapters();
        }
    }

    function updateStorage() { localStorage.setItem('rimuzz_books', JSON.stringify(books)); }
    function clearBookInputs() {
        document.getElementById('book-title').value = '';
        document.getElementById('book-desc').value = '';
        currentBookIndex = null;
        document.getElementById('book-modal-title').innerText = "BUAT BUKU BARU";
    }

    const container = document.getElementById('parallax-container');
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 60;
        const y = (window.innerHeight / 2 - e.pageY) / 60;
        container.style.transform = `translate(${x}px, ${y}px)`;
    });

    const pContainer = document.getElementById('particles-container');
    for (let i = 0; i < 30; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const s = Math.random() * 2 + 1;
        star.style.width = s + 'px';
        star.style.height = s + 'px';
        star.style.top = Math.random() * 100 + '%';
        star.style.left = Math.random() * 100 + '%';
        pContainer.appendChild(star);
    }
</script>
</body>
</html>
