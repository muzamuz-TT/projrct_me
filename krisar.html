<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rimuzz - Kritik & Saran</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background-color: #000;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Background matching the home page */
        #parallax-container {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            z-index: -3;
        }

        #bg-image {
            width: 100%;
            height: 100%;
            background-image: url('https://lh3.googleusercontent.com/u/0/d/10_EZUNRtKgGIhxoBPZdx8uEd0bfOZG4o');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.4);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            z-index: -1;
        }

        .content-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h2 {
            font-size: 1.8em;
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .sub-text {
            font-size: 0.9em;
            opacity: 0.6;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(59, 130, 246, 0.4);
            filter: brightness(1.1);
        }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            color: white;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .btn-back:hover {
            opacity: 1;
        }

        hr {
            border: 0;
            border-top: 1px solid var(--glass-border);
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div id="parallax-container">
    <div id="bg-image"></div>
</div>

<div class="overlay"></div>

<div class="content-card">
    <h2>KRISAR</h2>
    <p class="sub-text">Bantu kami menjadi lebih baik dengan masukan Anda.</p>
    
    <form action="https://formspree.io/f/xaqkwnkg" method="POST">
        
        <div class="form-group">
            <label for="nama">Nama (Opsional)</label>
            <input type="text" id="nama" name="Nama Pengirim" placeholder="Nama Anda (Bisa dikosongkan)">
        </div>

        <div class="form-group">
            <label for="email">Email Anda</label>
            <input type="email" id="email" name="_replyto" placeholder="nama@email.com" required>
        </div>

        <hr>

        <div class="form-group">
            <label for="kritik">Kritik</label>
            <textarea id="kritik" name="Kritik Pengguna" rows="3" placeholder="Apa keluhan atau kendala Anda?" required></textarea>
        </div>

        <div class="form-group">
            <label for="saran">Saran</label>
            <textarea id="saran" name="Saran Pengguna" rows="3" placeholder="Apa ide atau solusi perbaikan dari Anda?" required></textarea>
        </div>

        <input type="hidden" name="_subject" value="Kritik & Saran Baru Masuk!">

        <button type="submit">Kirim Masukan</button>
    </form>

    <a href="index.html" class="btn-back">
        <i class="fas fa-arrow-left"></i> Kembali ke Home
    </a>
</div>

</body>
</html>
